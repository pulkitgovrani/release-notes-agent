name: "Release Intelligence"
description: "Generate grounded release notes (changelog page + RSS + announcements) from your merged PRs — every line cites a real PR."
author: "pulkitgovrani"
branding:
  icon: "file-text"
  color: "purple"

# Reusable composite action. Reads PRs via the GitHub API (no checkout of the
# consumer's repo needed) and runs this repo's main.py from ${{ github.action_path }}.
inputs:
  anthropic-api-key:
    description: "Anthropic API key for Claude. Required unless provider is 'ollama'."
    required: false
    default: ""
  github-token:
    description: "Token used to read PRs/issues. Defaults to the workflow's GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  repo:
    description: "owner/name to read PRs from. Defaults to the repo running the action."
    required: false
    default: ${{ github.repository }}
  version:
    description: "Label for this release shown on the page, e.g. v1.2."
    required: false
    default: "latest"
  output:
    description: "Directory to write CHANGELOG.md / index.html / feed.xml into."
    required: false
    default: "output"
  since:
    description: "Only PRs merged after this tag (e.g. v1.0). Empty = since the latest release."
    required: false
    default: ""
  last:
    description: "Include the most recent N merged PRs instead of a date window."
    required: false
    default: ""
  since-days:
    description: "Include PRs merged in the last D days."
    required: false
    default: ""
  since-hours:
    description: "Include PRs merged in the last H hours."
    required: false
    default: ""
  announce:
    description: "Also draft X/Slack/LinkedIn announcements (true/false)."
    required: false
    default: "true"
  provider:
    description: "LLM provider: 'anthropic' (default) or 'ollama'."
    required: false
    default: "anthropic"
  python-version:
    description: "Python version for the runner."
    required: false
    default: "3.11"

outputs:
  output-dir:
    description: "Directory the changelog, HTML page, and RSS feed were written to."
    value: ${{ steps.run.outputs.output-dir }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/requirements.txt"

    - name: Generate release notes
      id: run
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        IN_REPO: ${{ inputs.repo }}
        IN_VERSION: ${{ inputs.version }}
        IN_OUTPUT: ${{ inputs.output }}
        IN_PROVIDER: ${{ inputs.provider }}
        IN_SINCE: ${{ inputs.since }}
        IN_LAST: ${{ inputs.last }}
        IN_SINCE_DAYS: ${{ inputs.since-days }}
        IN_SINCE_HOURS: ${{ inputs.since-hours }}
        IN_ANNOUNCE: ${{ inputs.announce }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        args=( --repo "$IN_REPO" --version "$IN_VERSION" --output "$IN_OUTPUT" --provider "$IN_PROVIDER" )
        if [ -n "$IN_SINCE" ];       then args+=( --since "$IN_SINCE" ); fi
        if [ -n "$IN_LAST" ];        then args+=( --last "$IN_LAST" ); fi
        if [ -n "$IN_SINCE_DAYS" ];  then args+=( --since-days "$IN_SINCE_DAYS" ); fi
        if [ -n "$IN_SINCE_HOURS" ]; then args+=( --since-hours "$IN_SINCE_HOURS" ); fi
        if [ "$IN_ANNOUNCE" = "false" ]; then args+=( --no-announce ); fi
        python "$ACTION_PATH/main.py" "${args[@]}"
        echo "output-dir=$IN_OUTPUT" >> "$GITHUB_OUTPUT"
